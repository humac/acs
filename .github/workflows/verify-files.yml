name: Verify Critical Files

on:
  workflow_call:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Verify critical files are complete
      run: |
        chmod +x .github/verify-critical-files.sh
        .github/verify-critical-files.sh
        
    - name: Report status
      if: success()
      run: echo "✅ All critical files verified successfully"
