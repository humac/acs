name: CI Tests

# Consolidated workflow that runs frontend and backend tests with path filtering
# Triggers conservatively to save runner minutes:
# - All PRs (to catch issues before merge)
# - Pushes to main and develop only when code changes
# - Manual runs via workflow_dispatch

on:
  workflow_call:
  pull_request:
    # Run on all PRs regardless of files changed
  push:
    branches:
      - develop
    paths:
      # Only run on push when these paths change
      - 'frontend/**'
      - 'backend/**'
      - 'package*.json'
      - '.github/workflows/ci-tests.yml'
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-tests
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.project }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        project: [frontend, backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ matrix.project }}
        run: npm ci

      - name: Lint code
        working-directory: ./${{ matrix.project }}
        run: npm run lint --if-present

      - name: Security audit
        working-directory: ./${{ matrix.project }}
        run: npm audit --audit-level=high || echo "::warning::Security vulnerabilities found - run npm audit for details"

      - name: Clean test environment (backend)
        if: matrix.project == 'backend'
        working-directory: ./backend
        run: |
          # Remove any existing test databases to ensure clean state
          rm -f data/*.db data/*.db-journal data/*.db-wal data/*.db-shm
          echo "Test environment cleaned"

      - name: Run tests
        working-directory: ./${{ matrix.project }}
        env:
          NODE_ENV: test
          CI: true
          # Backend specific test environment variables
          JWT_SECRET: test-jwt-secret-for-ci-only
        run: npm test

      - name: Generate coverage report
        working-directory: ./${{ matrix.project }}
        run: npm run test:coverage --if-present || echo "::warning::Coverage report generation failed"
        env:
          NODE_ENV: test
          CI: true
          JWT_SECRET: test-jwt-secret-for-ci-only

      - name: Build verification
        if: matrix.project == 'frontend'
        working-directory: ./frontend
        run: npm run build

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.project }}-coverage
          path: ${{ matrix.project }}/coverage/

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: acs_test
          POSTGRES_PASSWORD: acs_test_pw
          POSTGRES_DB: acs_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Start backend server
        env:
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: e2e-jwt-secret-for-ci-only
          DB_CLIENT: postgres
          POSTGRES_URL: postgresql://acs_test:acs_test_pw@localhost:5432/acs_e2e
        working-directory: ./backend
        run: |
          node server.js > ../backend.log 2>&1 &
          echo "Backend PID: $!"

      - name: Wait for backend health
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start. Logs:"
          cat backend.log || true
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ./frontend
        env:
          NODE_ENV: test
          CI: true
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: e2e-results.xml
        run: npx playwright test --forbid-only --reporter=list --reporter=junit

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload E2E JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-junit-results
          path: frontend/e2e-results.xml

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::E2E tests failed"
            exit 1
          fi
          echo "All tests passed"
