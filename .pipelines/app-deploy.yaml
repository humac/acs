trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'frontend/**'
      - 'backend/**'
      - '.pipelines/**'

variables:
  - group: railway-secrets
  - name: dockerRegistryServiceConnection
    value: 'ACR_SERVICE_CONNECTION'
  - name: imageTag
    value: 'sha-$(Build.SourceVersion)'

stages:
# --- STAGE 1: VERIFY ---
- stage: Verify
  displayName: 'Verify Critical Files'
  jobs:
  - job: VerifyFiles
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self
    - bash: |
        chmod +x .github/verify-critical-files.sh
        .github/verify-critical-files.sh
      displayName: 'Run Verification Script'

# --- STAGE 2: CI TESTS ---
- stage: Tests
  displayName: 'CI Tests'
  dependsOn: Verify
  jobs:
  - job: RunTests
    strategy:
      matrix:
        frontend:
          projectDir: 'frontend'
          testScript: 'test:ci'
        backend:
          projectDir: 'backend'
          testScript: 'test:ci'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: 'Install Node.js'

    - script: npm ci
      workingDirectory: $(projectDir)
      displayName: 'Install Dependencies'

    - script: npm run lint --if-present
      workingDirectory: $(projectDir)
      displayName: 'Lint'

    - script: npm audit --audit-level=high || true
      workingDirectory: $(projectDir)
      displayName: 'Security Audit'

    - script: |
        if [ "$(projectDir)" == "backend" ]; then
          rm -f data/*.db data/*.db-journal data/*.db-wal data/*.db-shm
          echo "Test environment cleaned"
        fi
      displayName: 'Clean Backend Test Env'

    # Runs Vitest for frontend and Jest for backend via the same command
    - script: |
        if [ "$(projectDir)" = "backend" ]; then
          # Run backend tests with detectOpenHandles to catch leaks; use npm script (cross-env handles NODE_OPTIONS)
          npm run $(testScript) -- --detectOpenHandles
        else
          npm run $(testScript)
        fi
      workingDirectory: $(projectDir)
      env:
        NODE_ENV: test
        CI: true
        JWT_SECRET: test-jwt-secret-for-ci-only
      displayName: 'Run Unit Tests'

    # Optional: Build verification for frontend (from your original ci-tests.yml)
    - script: npm run build
      condition: and(succeeded(), eq(variables['projectDir'], 'frontend'))
      workingDirectory: ./frontend
      displayName: 'Frontend Build Verification'

    # Publish results to the Azure DevOps "Tests" tab
    - task: PublishTestResults@2
      displayName: 'Publish $(projectDir) Test Results'
      condition: succeededOrFailed() # Ensure results are uploaded even if tests fail
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(projectDir)/junit.xml' # Points to the file generated by your scripts
        testRunTitle: '$(projectDir) Tests'
        
# --- STAGE 3: BUILD & PUSH ---
- stage: Build
  dependsOn: Tests
  condition: succeeded()
  jobs:
  - job: DockerBuild
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Build and Push Frontend'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: 'kars-frontend'
        command: 'buildAndPush'
        Dockerfile: 'frontend/Dockerfile'
        tags: |
          $(imageTag)
          latest

    - task: Docker@2
      displayName: 'Build and Push Backend'
      inputs:
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: 'kars-backend'
        command: 'buildAndPush'
        Dockerfile: 'backend/Dockerfile'
        tags: |
          $(imageTag)
          latest

# --- STAGE 4: DEPLOY DEV ---
- stage: DeployDev
  dependsOn: Build
  jobs:
  - deployment: DeployDevJob
    environment: 'dev'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              npx @railway/cli redeploy --service $(RAILWAY_FRONTEND_ID_DEV) --yes
              npx @railway/cli redeploy --service $(RAILWAY_BACKEND_ID_DEV) --yes
            env:
              RAILWAY_TOKEN: $(RAILWAY_TOKEN_DEV)

# --- STAGE 5: DEPLOY PROD ---
- stage: DeployProd
  dependsOn: DeployDev
  jobs:
  - deployment: DeployProdJob
    environment: 'prod'
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              npx @railway/cli redeploy --service $(RAILWAY_FRONTEND_ID_PROD) --yes
              npx @railway/cli redeploy --service $(RAILWAY_BACKEND_ID_PROD) --yes
            env:
              RAILWAY_TOKEN: $(RAILWAY_TOKEN_PROD)